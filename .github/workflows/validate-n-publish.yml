name: Validate & Publish

on:
  push:
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/flutter-validate.yml@bbf9b11828958cc3b840dbe4051e8493c6dfa2a6
  publish:
    needs: validate
    permissions:
      id-token: write
    uses: anthochamp/dev-toolbox/.github/workflows/flutter-lib-publish.yml@bbf9b11828958cc3b840dbe4051e8493c6dfa2a6
